<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calorie Counter</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-6 rounded-lg shadow-lg w-96">
  <h1 class="text-2xl font-bold mb-4 text-center">Calorie Counter</h1>

  <!-- Form -->
  <form id="food-form" class="mb-4">
    <input type="text" id="food-name" placeholder="Food name"
      class="w-full mb-2 p-2 border rounded" required>

    <input type="number" id="calories" placeholder="Calories"
      class="w-full mb-2 p-2 border rounded" required>

    <button class="w-full bg-blue-500 text-white p-2 rounded">
      Add Food
    </button>
  </form>

  <!-- Food List -->
  <ul id="food-list" class="mb-4"></ul>

  <!-- Total -->
  <h2 class="text-lg font-bold">
    Total Calories: <span id="total">0</span>
  </h2>

  <!-- Reset -->
  <button id="reset"
    class="mt-4 w-full bg-red-500 text-white p-2 rounded">
    Reset
  </button>
</div>

<script src="script.js"></script>
</body>
</html>
